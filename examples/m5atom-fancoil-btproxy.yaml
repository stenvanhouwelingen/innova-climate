substitutions:
  # Room name configuration (used for Home Assistant entity naming)
  room_name: "bedroom"
  friendly_room_name: "Bedroom"
  
  device_name: "innova-atom-${room_name}"
  friendly_name: "Innova Fancoil ${friendly_room_name}"

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  min_version: 2024.4.0
  name_add_mac_suffix: true

external_components:
  - source:
      type: git
      url: https://github.com/stenvanhouwelingen/innova-climate
      ref: 2026.6.25

esp32:
  board: m5stack-atom
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Atom Fancoil Fallback"
    password: !secret fallback_ap_password

captive_portal:

# =========================================================================
# BLUETOOTH PROXY & TRACKER (ESP32 BLE)
# =========================================================================
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

# =========================================================================
# UART / MODBUS PORT PIN CONFIGURATION (Atom Grove Port: TX=26, RX=32)
# =========================================================================
uart:
  id: modbus_uart
  tx_pin: 26
  rx_pin:
    number: 32
    mode: INPUT_PULLUP
  baud_rate: 9600
  stop_bits: 1
  rx_timeout: 10

modbus:
  id: modbus_bus
  uart_id: modbus_uart
  send_wait_time: 500ms

# =========================================================================
# INNOVA FANCOIL MODBUS PACKAGE
# =========================================================================
packages:
  # Default to newer board family (n273025d). Change to innova_n273025c.yaml if using an older board.
  innova_board:
    url: https://github.com/stenvanhouwelingen/innova-climate
    ref: 2026.6.25
    files: 
      - packages/innova_n273025d.yaml