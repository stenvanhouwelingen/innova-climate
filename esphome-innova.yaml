substitutions:
  room_name: "bedroom"
  friendly_room_name: "Bedroom"

external_components:
  - source:
      type: git
      url: https://github.com/stenvanhouwelingen/innova-climate
      ref: 2026.6.0

esphome:
  name: "innova-${room_name}"
  friendly_name: "Innova ${friendly_room_name}"
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  board: m5stack-atom
  framework:
    type: arduino

logger:
  level: DEBUG
  logs:
    modbus_controller: INFO
    modbus: INFO

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Innova ${friendly_room_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

uart:
  id: modbus_uart
  tx_pin: 26
  rx_pin:
    number: 32
    mode: INPUT_PULLUP
  baud_rate: 9600
  stop_bits: 1
  rx_timeout: 10

modbus:
  id: modbus_bus
  uart_id: modbus_uart
  send_wait_time: 500ms

modbus_controller:
  - id: innova_fan
    address: 1
    modbus_id: modbus_bus
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms

climate:
  - platform: innova_climate
    id: innova_climate_device
    name: "Thermostat"
    sensor_temp: current_room_temp
    number_setpoint: target_temp
    select_mode: seasonal_mode
    select_fan: fan_speed
    switch_power: power_switch
    sensor_status: innova_status_reg_${room_name}

sensor:
  # ==========================================
  # HIDDEN CONTROL ENTITIES
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: current_room_temp
    register_type: holding
    address: 0
    value_type: S_WORD
    filters:
      - multiply: 0.1
    internal: true
    force_new_range: true

  # ==========================================
  # VISIBLE TEMPERATURE & HUMIDITY SENSORS
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Inlet Water Temperature (T2)"
    register_type: holding
    address: 1
    value_type: S_WORD
    filters:
      - multiply: 0.1
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    accuracy_decimals: 1
    force_new_range: true
    skip_updates: 2

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Coil Water Temperature (T3)"
    register_type: holding
    address: 2
    value_type: S_WORD
    filters:
      - multiply: 0.1
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    accuracy_decimals: 1
    force_new_range: true
    skip_updates: 2

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Relative Humidity"
    register_type: holding
    address: 20
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: "humidity"
    state_class: "measurement"
    accuracy_decimals: 0
    force_new_range: true
    skip_updates: 5

  # ==========================================
  # SYSTEM & DIAGNOSTICS SENSORS
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Firmware Release"
    register_type: holding
    address: 198
    value_type: U_WORD
    filters:
      - multiply: 0.1
    accuracy_decimals: 1
    entity_category: "diagnostic"
    force_new_range: true
    skip_updates: 59

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Firmware Identifier"
    register_type: holding
    address: 199
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: "diagnostic"
    skip_updates: 59

  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: uptime
    name: "Uptime"
    id: innova_uptime
    entity_category: "diagnostic"

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: innova_alarms_${room_name}
    register_type: holding
    address: 151
    value_type: U_WORD
    internal: true
    force_new_range: true
    on_value:
      then:
        - text_sensor.template.publish:
            id: innova_current_alarm_${room_name}
            state: !lambda |-
              int alarm = (int)x;
              if (alarm == 0) return std::string("No faults");
              std::string faults = "";
              if (alarm & (1 << 0)) faults += "Modbus Comm Error, ";
              if (alarm & (1 << 1)) faults += "Air Temp Sensor (T1) Fault, ";
              if (alarm & (1 << 2)) faults += "Coil Water Sensor (T3) Fault, ";
              if (alarm & (1 << 3)) faults += "Overall Water Temp Inadequate, ";
              if (alarm & (1 << 4)) faults += "Inlet Water Sensor (T2) Fault, ";
              if (alarm & (1 << 5)) faults += "Inadequate Coil Water (T3) Temp, ";
              if (alarm & (1 << 6)) faults += "Electric Heater Over-temp, ";
              if (alarm & (1 << 7)) faults += "Fan Motor Failure, ";
              if (alarm & (1 << 8)) faults += "Window/Door Contact Open (IN1), ";
              if (alarm & (1 << 9)) faults += "Inadequate Inlet Water (T2) Temp, ";
              if (alarm & (1 << 10)) faults += "Air Filter Needs Cleaning, ";
              if (alarm & (1 << 11)) faults += "Lock: Inadequate Inlet Water (T2) Temp, ";
              if (alarm & (1 << 12)) faults += "Lock: Inadequate Coil Water (T3) Temp, ";
              if (!faults.empty()) {
                return faults.substr(0, faults.size() - 2);
              }
              return "Alarm code: " + std::to_string(alarm);

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: innova_status_reg_${room_name}
    register_type: holding
    address: 150
    value_type: U_WORD
    internal: true
    force_new_range: true
    on_value:
      then:
        - text_sensor.template.publish:
            id: innova_status_${room_name}
            state: !lambda |-
              int status = (int)x;
              if (status & (1 << 10)) return std::string("Standby");
              if (status & (1 << 0)) return std::string("Cooling");
              if (status & (1 << 1)) return std::string("Heating");
              return std::string("Idle");
        - text_sensor.template.publish:
            id: innova_fan_status_${room_name}
            state: !lambda |-
              int status = (int)x;
              if (status & (1 << 10)) return std::string("Stopped (Standby)");
              if (status & (1 << 2)) return std::string("Stopped (Water unsuitable for cooling)");
              if (status & (1 << 3)) return std::string("Stopped (Water unsuitable for heating)");
              if (status & (1 << 4)) return std::string("Stopped (Inadequate Inlet T2 temp)");
              if (status & (1 << 5)) return std::string("Stopped (Inadequate Coil T3 temp)");
              if (status & (1 << 6)) return std::string("Stopped (Inadequate water temp trend)");
              return std::string("Running");
        - binary_sensor.template.publish:
            id: innova_alarm_status_${room_name}
            state: !lambda |-
              int status = (int)x;
              return (status & (1 << 8)) != 0;

text_sensor:
  - platform: template
    name: "Diagnostics"
    id: innova_current_alarm_${room_name}

  - platform: template
    name: "Mode Status"
    id: innova_status_${room_name}

  - platform: template
    name: "Fan Status"
    id: innova_fan_status_${room_name}

binary_sensor:
  - platform: template
    name: "Alarm Status"
    id: innova_alarm_status_${room_name}
    device_class: "problem"
    entity_category: "diagnostic"

number:
  # ==========================================
  # HIDDEN SETPOINT NUMBER
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: target_temp
    register_type: holding
    address: 305
    value_type: U_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(target_temp).publish_state(x);
      return x * 10.0;
    min_value: 16
    max_value: 30
    step: 0.5
    internal: true

  # ==========================================
  # VISIBLE NUMBERS
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Temperature Calibration Offset"
    id: temp_calibration
    register_type: holding
    address: 304
    value_type: S_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(temp_calibration).publish_state(x);
      return x * 10.0;
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    unit_of_measurement: "°C"
    device_class: "temperature"
    entity_category: "config"
    force_new_range: true
    skip_updates: 29

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Minimum Water Temperature Limit for Heating"
    id: min_water_heating
    register_type: holding
    address: 510
    value_type: U_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(min_water_heating).publish_state(x);
      return x * 10.0;
    min_value: 15
    max_value: 40
    step: 1
    unit_of_measurement: "°C"
    device_class: "temperature"
    entity_category: "config"
    force_new_range: true
    skip_updates: 29

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Maximum Water Temperature Limit for Cooling"
    id: max_water_cooling
    register_type: holding
    address: 511
    value_type: U_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(max_water_cooling).publish_state(x);
      return x * 10.0;
    min_value: 15
    max_value: 35
    step: 1
    unit_of_measurement: "°C"
    device_class: "temperature"
    entity_category: "config"
    force_new_range: true
    skip_updates: 29

select:
  # ==========================================
  # HIDDEN SELECTS
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: seasonal_mode
    address: 556
    value_type: U_WORD
    optionsmap:
      "Auto": 0
      "Heating": 1
      "Cooling": 2
    optimistic: true
    internal: true
    force_new_range: true

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: fan_speed
    name: "Fan Speed"
    address: 553
    value_type: U_WORD
    optionsmap:
      "Auto": 0
      "Night": 1
      "Max": 2
    lambda: |-
      int mode = (int)x & 0x07;
      if (mode == 1) return std::string("Night");
      if (mode == 2) return std::string("Max");
      return std::string("Auto");
    optimistic: true
    force_new_range: true

switch:
  # ==========================================
  # HIDDEN POWER SWITCH
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: power_switch
    register_type: holding
    address: 553
    bitmask: 0x0010
    internal: true
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(power_switch).publish_state(true);'
    on_turn_off:
      - lambda: 'id(power_switch).publish_state(false);'

  # ==========================================
  # VISIBLE SWITCHES
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Keypad Lock"
    id: keypad_lock
    register_type: holding
    address: 553
    bitmask: 0x0008
    entity_category: "config"
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(keypad_lock).publish_state(true);'
    on_turn_off:
      - lambda: 'id(keypad_lock).publish_state(false);'

button:
  - platform: restart
    name: "Restart"