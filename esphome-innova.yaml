substitutions:
  room_name: "bedroom"
  friendly_room_name: "Bedroom"

external_components:
  - source:
      type: git
      url: https://github.com/stenvanhouwelingen/innova-climate
      ref: 2026.6.25

esphome:
  name: "innova-${room_name}"
  friendly_name: "Innova ${friendly_room_name}"
  min_version: 2026.4.0
  name_add_mac_suffix: false

# =========================================================================
# SELECT YOUR ESP32 MICROCONTROLLER BOARD:
# =========================================================================

# Option A (Default): M5Stack Atom Lite (ESP32)
esp32:
  board: m5stack-atom
  framework:
    type: arduino

# Option B: M5Stack NanoC6 (ESP32-C6)
# (To use, uncomment the lines below and comment out Option A above)
# esp32:
#   board: esp32-c6-devkitm-1
#   framework:
#     type: esp-idf

logger:
  level: DEBUG
  logs:
    modbus_controller: INFO
    modbus: INFO

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Innova ${friendly_room_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

# =========================================================================
# SELECT YOUR UART / MODBUS PORT PIN CONFIGURATION:
# =========================================================================

# Option A (Default): M5Stack Atom Lite Grove Port (TX=26, RX=32)
uart:
  id: modbus_uart
  tx_pin: 26
  rx_pin:
    number: 32
    mode: INPUT_PULLUP
  baud_rate: 9600
  stop_bits: 1
  rx_timeout: 10

# Option B: M5Stack NanoC6 Grove Port (TX=GPIO2/SDA, RX=GPIO1/SCL)
# (To use, uncomment the lines below and comment out Option A above)
# uart:
#   id: modbus_uart
#   tx_pin: 2
#   rx_pin:
#     number: 1
#     mode: INPUT_PULLUP
#   baud_rate: 9600
#   stop_bits: 1
#   rx_timeout: 10

modbus:
  id: modbus_bus
  uart_id: modbus_uart
  send_wait_time: 500ms

packages:
  # =========================================================================
  # CHOOSE YOUR INNOVA BOARD FAMILY CONFIGURATION:
  # =========================================================================
  
  # Option A (Default): Leave this line active if you have a newer board family (packages/innova_n273025d.yaml)
  # Board numbers: ECA789, PUB-30, EEB749, ECA844, ECA044
  # Fancoils: OSMO, AirLeaf, FÄRNA, Filomuro newer versions
  innova_board:
    url: https://github.com/stenvanhouwelingen/innova-climate
    ref: 2026.6.25
    files: 
      - packages/innova_n273025d.yaml
  # Option B: Comment out Option A and uncomment the lines below if you have an older board family / bridge card (packages/innova_n273025c.yaml)
  # Board numbers: INN-FR-B32, ECA644, ECA647, EDA649, EDB649, ESE645, ESE648
  # Fancoils: Filoterra, older AirLeaf/Filomuro Slim Fit / built-in
  # (To use, uncomment the line below and comment out Option A above)
  # innova_board:
  #   url: https://github.com/stenvanhouwelingen/innova-climate
  #   ref: 2026.6.25
  #   files: 
  #     - packages/innova_n273025c.yaml