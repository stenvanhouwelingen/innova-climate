modbus_controller:
  - id: innova_fan
    address: 1
    modbus_id: modbus_bus
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms

climate:
  - platform: innova_climate
    id: innova_climate_device
    name: "Thermostat"
    sensor_temp: current_room_temp
    number_setpoint: target_temp
    select_mode: seasonal_mode
    select_fan: fan_speed
    switch_power: power_switch
    sensor_status: innova_status_reg_${room_name}

sensor:
  - platform: internal_temperature
    name: "Board Temperature"
    id: board_temp
    state_class: "measurement"
    entity_category: "diagnostic"

  # ==========================================
  # HIDDEN CONTROL ENTITIES
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: current_room_temp
    register_type: holding
    address: 0
    value_type: S_WORD
    filters:
      - multiply: 0.1
    internal: true
    force_new_range: true

  # ==========================================
  # VISIBLE TEMPERATURE & HUMIDITY SENSORS
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Inlet Water Temperature (T2)"
    register_type: holding
    address: 1
    value_type: S_WORD
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x <= -30.0) return NAN;
          return x;
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    accuracy_decimals: 1
    force_new_range: true
    skip_updates: 2

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Coil Water Temperature (T3)"
    register_type: holding
    address: 2
    value_type: S_WORD
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x <= -30.0) return NAN;
          return x;
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    accuracy_decimals: 1
    force_new_range: true
    skip_updates: 2

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Relative Humidity"
    register_type: holding
    address: 20
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: "humidity"
    state_class: "measurement"
    accuracy_decimals: 0
    force_new_range: true
    skip_updates: 5

  # ==========================================
  # SYSTEM & DIAGNOSTICS SENSORS
  # ==========================================
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: uptime
    name: "Uptime"
    id: innova_uptime
    entity_category: "diagnostic"

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: innova_alarms_${room_name}
    register_type: holding
    address: 105
    value_type: U_WORD
    internal: true
    force_new_range: true
    on_value:
      then:
        - text_sensor.template.publish:
            id: innova_current_alarm_${room_name}
            state: !lambda |-
              int alarm = (int)x;
              if (alarm == 0) return std::string("No faults");
              std::string faults = "";
              if (alarm & (1 << 0)) faults += "Blind Comm Error, ";
              if (alarm & (1 << 1)) faults += "Air Temp Sensor (T1) Fault, ";
              if (alarm & (1 << 2)) faults += "H4 Water Sensor Fault, ";
              if (alarm & (1 << 3)) faults += "Block for Harmful Water, ";
              if (alarm & (1 << 4)) faults += "H2 Water Sensor Fault, ";
              if (alarm & (1 << 5)) faults += "Inadequate H4 Coil Temp, ";
              if (alarm & (1 << 6)) faults += "Electric Heater Over-temp, ";
              if (alarm & (1 << 7)) faults += "Fan Motor Failure, ";
              if (alarm & (1 << 8)) faults += "Grid Contact Open, ";
              if (alarm & (1 << 9)) faults += "Inadequate H2 Main Temp, ";
              if (alarm & (1 << 10)) faults += "Air Filter Needs Cleaning, ";
              if (alarm & (1 << 11)) faults += "Remote Probe Comm Error, ";
              if (!faults.empty()) {
                return faults.substr(0, faults.size() - 2);
              }
              return "Alarm code: " + std::to_string(alarm);

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: innova_status_reg_${room_name}
    register_type: holding
    address: 104
    value_type: U_WORD
    internal: true
    force_new_range: true
    on_value:
      then:
        - text_sensor.template.publish:
            id: innova_status_${room_name}
            state: !lambda |-
              int status = (int)x;
              if (status & (1 << 8)) return std::string("Standby");
              if (status & (1 << 0)) return std::string("Cooling");
              if (status & (1 << 1)) return std::string("Heating");
              return std::string("Idle");
        - text_sensor.template.publish:
            id: innova_fan_status_${room_name}
            state: !lambda |-
              int status = (int)x;
              if (status & (1 << 8)) return std::string("Stopped (Standby)");
              if (status & (1 << 2)) return std::string("Stopped (Water unsuitable on H2)");
              if (status & (1 << 3)) return std::string("Stopped (Water unsuitable on H4)");
              if (status & (1 << 4)) return std::string("Stopped (Unsuitable water / safety delay)");
              return std::string("Running");
        - binary_sensor.template.publish:
            id: innova_alarm_status_${room_name}
            state: !lambda |-
              int status = (int)x;
              return (status & (1 << 6)) != 0;

text_sensor:
  - platform: template
    name: "Diagnostics"
    id: innova_current_alarm_${room_name}

  - platform: template
    name: "Mode Status"
    id: innova_status_${room_name}

  - platform: template
    name: "Fan Status"
    id: innova_fan_status_${room_name}

binary_sensor:
  - platform: template
    name: "Alarm Status"
    id: innova_alarm_status_${room_name}
    device_class: "problem"
    entity_category: "diagnostic"

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Webserver Settings Bypassed"
    id: webserver_bypassed
    register_type: holding
    address: 247
    bitmask: 0x0080
    entity_category: "diagnostic"
    force_new_range: true
    skip_updates: 29

number:
  # ==========================================
  # HIDDEN SETPOINT NUMBER
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: target_temp
    register_type: holding
    address: 231
    value_type: U_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(target_temp).publish_state(x);
      return x * 10.0;
    min_value: 16
    max_value: 30
    step: 0.5
    internal: true

  # ==========================================
  # VISIBLE NUMBERS
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Room Temperature Calibration Offset"
    id: t1_sensor_offset
    register_type: holding
    address: 242
    value_type: S_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(t1_sensor_offset).publish_state(x);
      return x * 10.0;
    min_value: -1.2
    max_value: 1.2
    step: 0.1
    unit_of_measurement: "°C"
    device_class: "temperature"
    entity_category: "config"
    force_new_range: true
    skip_updates: 29

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Web Minimum Setpoint"
    id: web_min_setpoint
    register_type: holding
    address: 245
    value_type: U_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(web_min_setpoint).publish_state(x);
      return x * 10.0;
    min_value: 5
    max_value: 40
    step: 0.5
    unit_of_measurement: "°C"
    device_class: "temperature"
    entity_category: "config"
    force_new_range: true
    skip_updates: 29

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Web Maximum Setpoint"
    id: web_max_setpoint
    register_type: holding
    address: 246
    value_type: U_WORD
    use_write_multiple: false
    lambda: "return x * 0.1;"
    write_lambda: |-
      id(web_max_setpoint).publish_state(x);
      return x * 10.0;
    min_value: 5
    max_value: 40
    step: 0.5
    unit_of_measurement: "°C"
    device_class: "temperature"
    entity_category: "config"
    force_new_range: true
    skip_updates: 29

select:
  # ==========================================
  # HIDDEN SELECTS
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: seasonal_mode
    address: 233
    value_type: U_WORD
    optionsmap:
      "Auto": 0
      "Heating": 3
      "Cooling": 5
    optimistic: true
    internal: true
    force_new_range: true

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: fan_speed
    name: "Fan Speed"
    address: 201
    value_type: U_WORD
    optionsmap:
      "Auto": 0
      "Night": 1
      "Max": 3
    lambda: |-
      int mode = (int)x & 0x07;
      if (mode == 1) return std::string("Night");
      if (mode == 3) return std::string("Max");
      return std::string("Auto");
    optimistic: true
    force_new_range: true

switch:
  # ==========================================
  # HIDDEN POWER SWITCH
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    id: power_switch
    register_type: holding
    address: 201
    bitmask: 0x0080
    internal: true
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(power_switch).publish_state(true);'
    on_turn_off:
      - lambda: 'id(power_switch).publish_state(false);'

  # ==========================================
  # VISIBLE SWITCHES
  # ==========================================
  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Keypad Lock"
    id: keypad_lock
    register_type: holding
    address: 201
    bitmask: 0x0010
    entity_category: "config"
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(keypad_lock).publish_state(true);'
    on_turn_off:
      - lambda: 'id(keypad_lock).publish_state(false);'

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Web LED Off"
    id: web_led_off
    register_type: holding
    address: 247
    bitmask: 0x0001
    entity_category: "config"
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(web_led_off).publish_state(true);'
    on_turn_off:
      - lambda: 'id(web_led_off).publish_state(false);'

  - platform: modbus_controller
    modbus_controller_id: innova_fan
