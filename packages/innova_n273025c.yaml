  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Web Disable Power Control"
    id: web_disable_power_control
    register_type: holding
    address: 247
    bitmask: 0x0008
    entity_category: "config"
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(web_disable_power_control).publish_state(true);'
    on_turn_off:
      - lambda: 'id(web_disable_power_control).publish_state(false);'

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Web Inhibit Extremes"
    id: web_inhibit_extremes
    register_type: holding
    address: 247
    bitmask: 0x0010
    entity_category: "config"
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(web_inhibit_extremes).publish_state(true);'
    on_turn_off:
      - lambda: 'id(web_inhibit_extremes).publish_state(false);'

  - platform: modbus_controller
    modbus_controller_id: innova_fan
    name: "Web Enable Setpoint Restriction"
    id: web_enable_setpoint_restriction
    register_type: holding
    address: 247
    bitmask: 0x0020
    entity_category: "config"
    skip_updates: 1000
    on_turn_on:
      - lambda: 'id(web_enable_setpoint_restriction).publish_state(true);'
    on_turn_off:
